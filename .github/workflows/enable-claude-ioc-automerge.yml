name: Enable auto-merge for Claude IOC PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    name: enable-automerge
    runs-on: ubuntu-latest

    if: >
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'claude/collect-iocs-')

    steps:
      - name: Check PR files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          gh pr diff "$PR_NUMBER" \
            --repo "$REPO" \
            --name-only > /tmp/pr_files.txt

          echo "PR files:"
          cat /tmp/pr_files.txt

          python3 <<'PY'
          import pathlib
          import re
          import sys

          files = [
              line.strip()
              for line in pathlib.Path("/tmp/pr_files.txt").read_text().splitlines()
              if line.strip()
          ]

          if not files:
              raise SystemExit("No changed files found.")

          allowed = re.compile(
              r"^daily-news/iocs/[0-9]{4}_[0-9]{2}-[0-9]{2}/[0-9]{8}\.(csv|md)$"
          )

          bad = [f for f in files if not allowed.fullmatch(f)]
          csvs = [f for f in files if f.endswith(".csv")]

          if bad:
              print("Disallowed files were changed:", file=sys.stderr)
              for f in bad:
                  print(f"- {f}", file=sys.stderr)
              raise SystemExit(1)

          if not csvs:
              raise SystemExit("No IOC CSV file was changed.")

          print("PR file check passed.")
          PY

      - name: Enable GitHub auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --squash \
            --auto \
            --delete-branch
