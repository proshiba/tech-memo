name: Trigger Claude Events Routine

on:
  push:
    branches:
      - main
    paths:
      - "daily-news/news/**/*.md"

  workflow_dispatch:
    inputs:
      news_file:
        description: "対象ニュースMD。例: daily-news/news/2026_04-06/20260430.md"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: trigger-claude-events-routine-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trigger-routine:
    name: trigger-claude-events-routine
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect newly added news files
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_NEWS_FILE: ${{ inputs.news_file }}
        run: |
          set -euo pipefail

          : > /tmp/candidate_news_files.txt

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ -z "${MANUAL_NEWS_FILE:-}" ]]; then
              echo "news_file input is required for workflow_dispatch." >&2
              exit 1
            fi

            if [[ ! -f "$MANUAL_NEWS_FILE" ]]; then
              echo "Manual input file does not exist: $MANUAL_NEWS_FILE" >&2
              exit 1
            fi

            printf '%s\n' "$MANUAL_NEWS_FILE" > /tmp/candidate_news_files.txt
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"

            if [[ "$BASE" =~ ^0+$ ]]; then
              git diff-tree \
                --no-commit-id \
                --name-only \
                --diff-filter=A \
                -r "$HEAD" > /tmp/changed_files.txt
            else
              git diff \
                --name-only \
                --diff-filter=A \
                "$BASE" "$HEAD" > /tmp/changed_files.txt
            fi

            echo "Added files in this push:"
            cat /tmp/changed_files.txt || true

            grep -E '^daily-news/news/[0-9]{4}_[0-9]{2}-[0-9]{2}/[0-9]{8}\.md$' \
              /tmp/changed_files.txt > /tmp/candidate_news_files.txt || true
          fi

          if [[ ! -s /tmp/candidate_news_files.txt ]]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No newly added daily-news/news/YYYY_MM-MM/YYYYMMDD.md files."
            exit 0
          fi

          echo "Candidate news files:"
          cat /tmp/candidate_news_files.txt

          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import datetime as dt
          import json
          import pathlib
          import re

          files = [
              line.strip()
              for line in pathlib.Path("/tmp/candidate_news_files.txt").read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]

          targets = []

          for f in files:
              m = re.fullmatch(r"daily-news/news/(\d{4}_\d{2}-\d{2})/(\d{8})\.md", f)
              if not m:
                  raise SystemExit(f"Unexpected news file path: {f}")

              period, ymd = m.groups()
              yyyy, mm, dd = ymd[:4], ymd[4:6], ymd[6:8]

              target_date = f"{yyyy}-{mm}-{dd}"
              date_obj = dt.date(int(yyyy), int(mm), int(dd))
              iso = date_obj.isocalendar()

              target_year = yyyy
              target_month = f"{yyyy}-{mm}"
              target_week = f"{iso.year}-W{iso.week:02d}"

              out_dir = f"daily-news/data/{target_year}/{target_month}"

              targets.append({
                  "period": period,
                  "target_date": target_date,
                  "target_ymd": ymd,
                  "target_year": target_year,
                  "target_month": target_month,
                  "target_week": target_week,
                  "news_file": f,
                  "output_events_csv": f"{out_dir}/events.csv",
                  "output_event_tags_csv": f"{out_dir}/event_tags.csv"
              })

          primary_ymd = targets[0]["target_ymd"]

          print("has_files=true")
          print(f"target_count={len(targets)}")
          print(f"primary_ymd={primary_ymd}")

          print("targets_json<<__JSON__")
          print(json.dumps(targets, ensure_ascii=False, indent=2))
          print("__JSON__")
          PY

      - name: Trigger Claude Code Cloud Routine
        id: trigger
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        env:
          ROUTINE_FIRE_URL: ${{ secrets.CLAUDE_EVENTS_ROUTINE_FIRE_URL }}
          ROUTINE_FIRE_TOKEN: ${{ secrets.CLAUDE_EVENTS_ROUTINE_FIRE_TOKEN }}
          TARGETS_JSON: ${{ steps.detect.outputs.targets_json }}
          PRIMARY_YMD: ${{ steps.detect.outputs.primary_ymd }}
        run: |
          set -euo pipefail

          if [[ -z "${ROUTINE_FIRE_URL:-}" ]]; then
            echo "CLAUDE_EVENTS_ROUTINE_FIRE_URL is not set." >&2
            exit 1
          fi

          if [[ -z "${ROUTINE_FIRE_TOKEN:-}" ]]; then
            echo "CLAUDE_EVENTS_ROUTINE_FIRE_TOKEN is not set." >&2
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          SUGGESTED_BRANCH="claude/make-events-csv-${PRIMARY_YMD}-${SHORT_SHA}"

          BODY="$(jq -n \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg branch "${GITHUB_REF_NAME}" \
            --arg trigger_sha "${GITHUB_SHA}" \
            --arg short_sha "${SHORT_SHA}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg suggested_branch "${SUGGESTED_BRANCH}" \
            --arg targets_json "${TARGETS_JSON}" \
            '{
              text: (
                "GitHub Actions triggered Claude Code Cloud daily events CSV generation.\n\n" +
                "Repository: " + $repository + "\n" +
                "Branch: " + $branch + "\n" +
                "Trigger SHA: " + $trigger_sha + "\n" +
                "Short SHA: " + $short_sha + "\n" +
                "GitHub Actions run ID: " + $run_id + "\n" +
                "GitHub Actions run URL: " + $run_url + "\n" +
                "Suggested PR branch: " + $suggested_branch + "\n\n" +

                "Process only the following targets.\n\n" +
                "Each target contains target_date, target_ymd, target_year, target_month, target_week, news_file, output_events_csv, and output_event_tags_csv.\n\n" +
                "```json\n" +
                $targets_json +
                "\n```\n\n" +

                "Use the saved Routine instructions.\n" +
                "Create or update events.csv and event_tags.csv for each target.\n" +
                "Validate every generated or updated CSV.\n" +
                "If validation succeeds, create a pull request against main from the suggested branch.\n" +
                "Do not push directly to main.\n" +
                "Do not merge the pull request.\n" +
                "Do not enable auto-merge.\n" +
                "Only modify output_events_csv and output_event_tags_csv files listed in the targets JSON.\n" +
                "Do not modify taxonomy files, news files, .github files, prompt files, or unrelated files."
              )
            }')"

          echo "Triggering Claude Code Cloud Routine..."
          curl -sS -f -X POST "$ROUTINE_FIRE_URL" \
            -H "Authorization: Bearer $ROUTINE_FIRE_TOKEN" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            | tee /tmp/claude_routine_response.json

          jq -e '.claude_code_session_id and .claude_code_session_url' \
            /tmp/claude_routine_response.json > /dev/null

          SESSION_ID="$(jq -r '.claude_code_session_id' /tmp/claude_routine_response.json)"
          SESSION_URL="$(jq -r '.claude_code_session_url' /tmp/claude_routine_response.json)"

          {
            echo "### Claude Code Cloud Events Routine triggered"
            echo
            echo "- Session ID: ${SESSION_ID}"
            echo "- Session URL: ${SESSION_URL}"
            echo "- Suggested PR branch: ${SUGGESTED_BRANCH}"
            echo "- Trigger SHA: ${GITHUB_SHA}"
            echo
            echo "Targets:"
            echo
            echo '```json'
            printf '%s\n' "$TARGETS_JSON"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
