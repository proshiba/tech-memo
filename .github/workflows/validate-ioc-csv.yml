name: Validate IOC CSV

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-ioc-csv:
    name: validate-ioc-csv
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: List changed IOC CSV files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          gh pr diff "$PR_NUMBER" \
            --repo "$REPO" \
            --name-only > /tmp/changed_files.txt

          grep -E '^daily-news/iocs/[0-9]{4}_[0-9]{2}-[0-9]{2}/[0-9]{8}\.csv$' \
            /tmp/changed_files.txt > /tmp/ioc_csv_files.txt || true

          echo "Changed files:"
          cat /tmp/changed_files.txt

          echo "Changed IOC CSV files:"
          cat /tmp/ioc_csv_files.txt || true

      - name: Validate IOC CSV files
        shell: bash
        run: |
          python3 <<'PY'
          import csv
          import pathlib
          import re
          import sys

          csv_list_path = pathlib.Path("/tmp/ioc_csv_files.txt")

          if not csv_list_path.exists():
              print("No IOC CSV file list found.")
              sys.exit(1)

          csv_files = [
              pathlib.Path(line.strip())
              for line in csv_list_path.read_text().splitlines()
              if line.strip()
          ]

          if not csv_files:
              print("No IOC CSV files changed. Passing.")
              sys.exit(0)

          expected_header = [
              "ioc_type",
              "ioc_value",
              "date",
              "category",
              "actor",
              "actor_attribute",
              "malware",
              "malware_type",
              "reference",
              "description",
              "author",
              "confidence",
          ]

          allowed_types = {
              "ip",
              "domain",
              "url",
              "file_hash_md5",
              "file_hash_sha1",
              "file_hash_sha256",
          }

          allowed_categories = {
              "c2",
              "srcip",
              "phishing-site",
              "malware",
              "tool",
              "abusefile",
              "related-file",
              "unknown",
          }

          errors = []

          for path in csv_files:
              if not path.exists():
                  errors.append(f"{path}: file does not exist")
                  continue

              try:
                  with path.open("r", encoding="utf-8", newline="") as f:
                      reader = csv.DictReader(f)

                      if reader.fieldnames != expected_header:
                          errors.append(f"{path}: invalid header: {reader.fieldnames}")
                          continue

                      seen = set()

                      for line_no, row in enumerate(reader, start=2):
                          ioc_type = row.get("ioc_type", "")
                          ioc_value = row.get("ioc_value", "")
                          date = row.get("date", "")
                          category = row.get("category", "")
                          description = row.get("description", "")
                          author = row.get("author", "")
                          confidence = row.get("confidence", "")
                          reference = row.get("reference", "")

                          if not ioc_value.strip():
                              errors.append(f"{path}:{line_no}: empty ioc_value")

                          if ioc_type not in allowed_types:
                              errors.append(f"{path}:{line_no}: invalid ioc_type={ioc_type}")

                          if category not in allowed_categories:
                              errors.append(f"{path}:{line_no}: invalid category={category}")

                          if not re.fullmatch(r"\d{4}-\d{2}-\d{2}", date):
                              errors.append(f"{path}:{line_no}: invalid date={date}")

                          if not description.startswith("AI generated."):
                              errors.append(f"{path}:{line_no}: description must start with 'AI generated.'")

                          if author != "AI agent":
                              errors.append(f"{path}:{line_no}: author must be 'AI agent'")

                          if confidence != "medium":
                              errors.append(f"{path}:{line_no}: confidence must be 'medium'")

                          key = (ioc_type, ioc_value, reference)
                          if key in seen:
                              errors.append(f"{path}:{line_no}: duplicated IOC/reference: {key}")

                          seen.add(key)

              except UnicodeDecodeError:
                  errors.append(f"{path}: not valid UTF-8")
              except csv.Error as e:
                  errors.append(f"{path}: CSV parse error: {e}")

          if errors:
              print("\n".join(errors), file=sys.stderr)
              sys.exit(1)

          print("IOC CSV validation passed.")
          PY
