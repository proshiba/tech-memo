# 31. 出力品質

- UTF-8 の CSV とする
- BOMなしとする
- 改行コードはLFのみとする
- `events.csv` は `date,event_key` の順を基本に整える
- `event_tags.csv` は `event_key,dimension,normalized_value` の順を基本に整える
- 要約は簡潔にする
- ハルシネーション禁止
- taxonomy 外の値を勝手に増やさない
- 不明なら `unknown`
- 迷うなら `needs_review=true`
- taxonomy が足りないだけなら `unknown` で埋めず、`taxonomy_gap` として報告する
- 全面再生成ではなく create / update / upsert として扱う
- 既存の正しいデータを不要に削除しない
- 対象日以外の既存データを保持する
- 変更対象外ファイルを変更しない

では、対象日のDaily Markdownを読み、対象月の `events.csv` と `event_tags.csv` を作成または更新してください。
