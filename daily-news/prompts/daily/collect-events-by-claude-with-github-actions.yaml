# 29. Git操作とPull Request作成方針

CSV作成と検証が成功した場合のみ、Pull Requestを作成してください。

## 実施方針

1. `main` の最新状態を取得する。
2. `suggested_branch` が渡されている場合は、そのbranch名を使う。
3. `suggested_branch` がない場合は、`claude/make-events-csv-<YYYYMMDD>-<short_sha>` の形式でbranchを作成する。
4. 変更してよいファイルは `output_events_csv` と `output_event_tags_csv` のみ。
5. 変更対象外のファイルが変更されていないことを確認する。
6. CSV検証が成功していることを確認する。
7. commit messageは以下の形式にする。

```text
Update daily events CSV: <YYYYMMDD>
```

8. branchをpushする。
9. `main` をbase branchとしてPull Requestを作成する。
10. PR titleは以下の形式にする。

```text
Update daily events CSV: <YYYYMMDD>
```

11. PR本文には以下を含める。

- 対象日
- 入力Daily Markdown
- 出力events.csv
- 出力event_tags.csv
- created events
- updated events
- created tags
- updated tags
- skipped items
- needs_review items
- taxonomy_gap items
- actor_gap items
- product_gap items
- malware_gap items
- classification_review items
- CSV検証結果
- 変更したファイル一覧
- trigger_sha

12. mainには直接pushしない。
13. PRをマージしない。
14. auto-mergeの有効化は行わない。
15. auto-mergeの有効化とマージ可否判断はGitHub Actions側に任せる。

検証に失敗した場合は、commit、push、PR作成を行わず、失敗理由を簡潔に説明してください。

---

# 30. 最後の報告フォーマット

最後に、PR本文とsession内の最終報告で以下を簡潔に報告してください。

- 対象日
- 読み込んだDaily Markdown
- 読み込んだtaxonomy files
- 更新した出力ファイル一覧
- created events
- updated events
- created tags
- updated tags
- skipped items
- needs_review items
- taxonomy_gap items
- actor_tagged_events
- product_tagged_events
- malware_tagged_events
- attack_method_tagged_events
- crime_trend_tagged_events
- explicit_actor_mentions_without_actor_tag
- actor_gap items
- product_gap items
- malware_gap items
- classification_review items
- DDoS関連で確認した event_key 一覧
- SQL Injection関連で確認した event_key 一覧
- `taxonomy_values.csv` を変更していないこと
- `taxonomy_dimensions.csv` を変更していないこと
- unrelated なファイルを変更していないこと
- CSVがLF改行であること
- PRを作成した場合はPR URL

チャットやPR本文に長大なイベント詳細やタグ全量を出力しないでください。
詳細はCSV差分で確認できるようにしてください。

